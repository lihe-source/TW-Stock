name: 每日更新台股資料

on:
  schedule:
    # 台灣時間 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      stock_limit:
        description: '限制股票數（0=全部，50=測試用）'
        required: false
        default: '0'

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas beautifulsoup4 lxml

      - name: Build screener data
        env:
          STOCK_LIMIT: ${{ github.event.inputs.stock_limit || '0' }}
          # V3.0: 月營收改用 MOPS（完全免費，不需 Token）
          # FinMind Token 已不再需要
        run: python3 scripts/build_data.py

      - name: Validate output
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('data/screener.json'))
          n  = d['stockCount']
          c  = d.get('coverage', {})
          rev = c.get('revenue', 0)
          print(f'stockCount : {n}')
          print(f'dataDate   : {d[\"dataDate\"]}')
          print(f'source     : {d[\"source\"]}')
          print(f'RS覆蓋     : {c.get(\"technical\",0)}/{n}')
          print(f'月營收覆蓋 : {rev}/{n} ({rev/n*100:.1f}%)')
          if n == 0: print('ERROR: no stocks!'); sys.exit(1)
          "

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener.json
          git diff --staged --quiet \
            && echo "資料無變更" \
            || git commit -m "data: 更新台股資料 $(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M')"
          git push
