name: 每日更新台股資料

on:
  schedule:
    # 台灣時間 15:30 = UTC 07:30（收盤後 2 小時，確保 TWSE 資料完整）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      stock_limit:
        description: '限制股票數（0=全部，50=測試用）'
        required: false
        default: '0'

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas beautifulsoup4 lxml

      - name: Build screener data
        env:
          FINMIND_TOKEN:   ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_2: ${{ secrets.FINMIND_TOKEN_2 }}
          FINMIND_TOKEN_3: ${{ secrets.FINMIND_TOKEN_3 }}
          STOCK_LIMIT:     ${{ github.event.inputs.stock_limit || '0' }}
        run: python3 scripts/build_data.py

      - name: Validate output
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('data/screener.json'))
          n = d['stockCount']
          print(f'stockCount : {n}')
          print(f'dataDate   : {d[\"dataDate\"]}')
          print(f'coverage   : {d.get(\"coverage\",{})}')
          if n == 0: print('ERROR: no stocks!'); sys.exit(1)
          for s in d['stocks'][:3]:
              print(f'  {s[\"code\"]} rs={s[\"rsScore\"]} f5d={s.get(\"foreignBuy5d\")}')
          "

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener.json
          git diff --staged --quiet \
            && echo "資料無變更" \
            || git commit -m "data: 更新台股資料 $(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M')"
          git push
